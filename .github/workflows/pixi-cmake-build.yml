name: Pixi CMake build (reusable)

on:
  workflow_call:
    inputs:
      tasks:
        description: |
          JSON array of pixi task invocations to run in order with `pixi run --locked`.
          Each element is shell word-split, so positional pixi args are supported:
          '["configure", "build", "test", "ci-sim helium"]'.
        type: string
        default: '["test"]'
      lfs:
        description: Fetch git-lfs files during checkout
        type: boolean
        default: false
      runs-on:
        description: GitHub runner label (e.g. ubuntu-latest, self-hosted)
        type: string
        default: ubuntu-latest
      cache:
        description: Enable pixi cache
        type: boolean
        default: true
      env-vars:
        description: Newline-separated KEY=VALUE env vars exported before tasks run
        type: string
        default: ''
      artifact-name:
        description: Name of the artifact to upload (skipped when artifact-path is empty)
        type: string
        default: ''
      artifact-path:
        description: |
          Path (or newline-separated globs) of files to upload as an artifact
          after tasks complete. Skipped when empty.
        type: string
        default: ''
      artifact-retention-days:
        description: Retention period for the uploaded artifact (days)
        type: number
        default: 30
      ccache:
        description: Cache compiler output with ccache across runs
        type: boolean
        default: true
      ccache-key:
        description: Extra ccache cache-key component (e.g. a matrix configuration)
        type: string
        default: ''

jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: ${{ inputs.lfs }}
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          cache: ${{ inputs.cache }}
      - uses: hendrikmuhs/ccache-action@v1
        if: inputs.ccache
        with:
          key: ${{ inputs.runs-on }}${{ inputs.ccache-key != '' && format('-{0}', inputs.ccache-key) || '' }}
      - name: Route compilation through ccache
        if: inputs.ccache
        # CMake >=3.17 picks these up at configure time, so consumer tasks
        # need no changes; ccache is on the host PATH inside `pixi run`.
        run: |
          echo "CMAKE_C_COMPILER_LAUNCHER=ccache" >> "$GITHUB_ENV"
          echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> "$GITHUB_ENV"
      - name: Export env vars
        if: inputs.env-vars != ''
        env:
          ENV_VARS: ${{ inputs.env-vars }}
        run: |
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            echo "$line" >> "$GITHUB_ENV"
          done <<< "$ENV_VARS"
      - name: Run pixi tasks
        env:
          TASKS_JSON: ${{ inputs.tasks }}
        run: |
          echo "$TASKS_JSON" | jq -r '.[]' | while IFS= read -r task; do
            echo "::group::pixi run --locked $task"
            # shellcheck disable=SC2086 # intentional word-splitting for positional task args
            pixi run --locked $task
            echo "::endgroup::"
          done
      - name: Upload artifact
        if: inputs.artifact-path != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: error
