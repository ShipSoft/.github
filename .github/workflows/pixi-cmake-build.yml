name: Pixi CMake build (reusable)

on:
  workflow_call:
    inputs:
      tasks:
        description: |
          JSON array of pixi task names to run in order with `pixi run --locked`.
          Example: '["configure","build","test"]'.
        type: string
        default: '["test"]'
      lfs:
        description: Fetch git-lfs files during checkout
        type: boolean
        default: false
      runs-on:
        description: GitHub runner label (e.g. ubuntu-latest, self-hosted)
        type: string
        default: ubuntu-latest
      cache:
        description: Enable pixi cache
        type: boolean
        default: true
      env-vars:
        description: Newline-separated KEY=VALUE env vars exported before tasks run
        type: string
        default: ''

jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: ${{ inputs.lfs }}
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          cache: ${{ inputs.cache }}
      - name: Export env vars
        if: inputs.env-vars != ''
        env:
          ENV_VARS: ${{ inputs.env-vars }}
        run: |
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            echo "$line" >> "$GITHUB_ENV"
          done <<< "$ENV_VARS"
      - name: Run pixi tasks
        env:
          TASKS_JSON: ${{ inputs.tasks }}
        run: |
          echo "$TASKS_JSON" | jq -r '.[]' | while IFS= read -r task; do
            echo "::group::pixi run --locked $task"
            pixi run --locked "$task"
            echo "::endgroup::"
          done
