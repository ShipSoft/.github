name: Release (reusable)

on:
  workflow_call:
    inputs:
      cliff-config:
        description: Path to the git-cliff config in the caller repo
        type: string
        default: cliff.toml

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Require tag ref
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          echo "::error::release.yml must be called from a tag push (github.ref starts with refs/tags/), got: $GITHUB_REF"
          exit 1

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: ${{ inputs.cliff-config }}
          args: --latest --strip header --tag ${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.cliff.outputs.changelog }}
          draft: false
          prerelease: false
