name: Pixi lock update (reusable)

on:
  workflow_call:
    inputs:
      base:
        description: Branch to open the pixi-update PR against (e.g. main, master)
        type: string
        required: true
      add-paths:
        description: Paths to include in the PR (newline-separated)
        type: string
        default: pixi.lock
      pr-branch:
        description: Branch name used for the PR
        type: string
        default: update-pixi
      pr-label:
        description: Label to apply to the PR
        type: string
        default: pixi

permissions:
  contents: write
  pull-requests: write

jobs:
  pixi-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          run-install: false
      - name: Update lock files
        run: |
          set -o pipefail
          pixi update --json | pixi exec pixi-diff-to-markdown >> diff.md
      - uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update pixi lock file"
          title: Update pixi lock file
          body-path: diff.md
          branch: ${{ inputs.pr-branch }}
          base: ${{ inputs.base }}
          labels: ${{ inputs.pr-label }}
          delete-branch: true
          add-paths: ${{ inputs.add-paths }}
