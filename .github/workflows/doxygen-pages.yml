name: Doxygen Pages (reusable)
on:
  workflow_call:
    inputs:
      doxyfile:
        description: Path to the Doxyfile
        type: string
        default: doxygen/Doxyfile
      html-dir:
        description: Path to the generated HTML output directory
        type: string
        default: doxygen/html
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Doxygen and Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz doxygen
      - name: Generate Doxygen
        run: doxygen "${{ inputs.doxyfile }}"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ inputs.html-dir }}
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
